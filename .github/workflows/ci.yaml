name: CI
on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - master

jobs:
  unit-test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install rustup
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - uses: Swatinem/rust-cache@v2
      - name: test
        run: cargo test
      - name: lint
        run: cargo clippy
      # currently `cargo wasi test` doesn't run, so ensure at least that it builds
      - name: build (wasi)
        run: cargo build --target wasm32-wasip1
  unit-test-js:
    runs-on: ubuntu-latest
    name: unit-test-js (Node ${{ matrix.node-version }})
    strategy:
      matrix:
        node-version: [22, 24, 26]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run check --workspaces --if-present
      - run: npm test --workspaces --if-present
  e2e-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24, 26]
    name: e2e-test (Node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v7
      - name: install rustup
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install
      - name: build rust
        run: ./build/build-rust.sh
      - name: build node
        run: ./build/build-node.sh
      - name: run e2e tests
        run: npm run e2e-test --workspace ./e2e-tests
      - name: run nitrogql in nextjs example
        run: |
          npm run generate
          npm run build
        working-directory: examples/nextjs
      - name: run nitrogql in vite example
        run: |
          npm run generate
          npm run build
        working-directory: examples/vite
